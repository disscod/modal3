name: Deploy to Modal

on:
  workflow_dispatch:
  schedule:
    - cron: '38 18 * * *'  # 每天执行一次

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10   

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Modal SDK
        run: pip install --no-cache-dir --upgrade "modal>=0.58.0"

      # ✅ 正确登录 Modal（关键修复）
      - name: Setup Modal Auth
        run: |
          modal token set $MODAL_TOKEN_ID $MODAL_TOKEN_SECRET
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}

      # ✅ 可选：调试（确认 token 是否读取成功）
      - name: Debug Token
        run: |
          echo "ID length: ${#MODAL_TOKEN_ID}"
          echo "SECRET length: ${#MODAL_TOKEN_SECRET}"
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}

      - name: Run app remotely
        run: python deploy.py --sandbox

      - name: Commit time.txt to repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ ! -f time.txt ]; then
            echo "首次生成时间：$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          else
            echo "$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          fi

          git add time.txt

          if git diff --cached --quiet; then
            echo "无变化，无需提交"
          else
            git commit -m "⏱️ 更新时间文件: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin HEAD:main
          fi
